catalogMode: prefer
ignoreWorkspaceRootCheck: true
minimumReleaseAgeExclude:
  - vue
  - '@vue/*'
shellEmulator: true

trustPolicy: no-downgrade

packages:
  - packages/*
  - storybook
  - playground

catalogs:
  cli:
    '@antfu/eslint-config': ^9.0.0
    '@antfu/ni': ^30.1.0
    bumpp: ^11.1.0
    eslint: ^10.4.0
    nano-staged: ^1.0.2
    publint: ^0.3.21
    simple-git-hooks: ^2.13.1
    skills-npm: ^1.1.1
    tsdown: ^0.22.0
    tsx: ^4.22.2
    typescript: ^6.0.3
    vite: ^8.0.13
  frontend:
    '@iconify-json/catppuccin': ^1.2.17
    '@iconify-json/ph': ^1.2.2
    '@tanstack/vue-virtual': ^3.13.29
    '@unocss/core': '>=66.0.0'
    '@unocss/eslint-plugin': ^66.7.2
    '@unocss/preset-icons': ^66.7.2
    '@unocss/preset-mini': ^66.7.2
    '@unocss/preset-web-fonts': ^66.7.2
    '@unocss/preset-wind3': ^66.7.2
    '@unocss/preset-wind4': ^66.7.2
    '@unocss/transformer-directives': ^66.7.2
    '@vitejs/plugin-vue': ^6.0.7
    '@vueuse/core': ^14.3.0
    colorjs.io: ^0.6.1
    dompurify: ^3.4.12
    floating-vue: ^5.2.2
    reka-ui: ^2.10.0
    splitpanes: ^4.1.2
    unocss: ^66.7.2
    unplugin-vue: ^7.2.0
    vue: ^3.5.38
    vue-tsc: ^3.3.5
  inlined:
    '@antfu/utils': ^9.3.0
  storybook:
    '@storybook/addon-docs': ^10.4.6
    '@storybook/vue3-vite': ^10.4.6
    storybook: ^10.4.6

  testing:
    '@arethetypeswrong/cli': ^0.18.2
    '@axe-core/playwright': ^4.12.1
    '@vue/test-utils': ^2.4.11
    happy-dom: ^20.10.6
    magic-string: ^0.30.21
    playwright: ^1.61.1
    tsdown-stale-guard: ^0.1.2
    tsnapi: ^0.3.3
    vitest: ^4.1.6
  types:
    '@types/node': ^25.9.0
allowBuilds:
  esbuild: true
  simple-git-hooks: true
  vue-demi: true
